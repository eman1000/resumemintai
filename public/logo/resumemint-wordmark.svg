<?xml version="1.0" encoding="UTF-8"?>
<!-- ResumeMint horizontal wordmark — icon on the left, "Resumemint" wordmark on
     the right with "mint" highlighted in the accent green. Sized for use at
     ~40px row height in headers / emails. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160"
     role="img" aria-label="ResumeMint">
  <defs>
    <linearGradient id="rmw-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d8be0" />
      <stop offset="100%" stop-color="#2a72d7" />
    </linearGradient>
    <linearGradient id="rmw-leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#00b67a" />
    </linearGradient>
  </defs>

  <!-- Icon (160x160 inside) -->
  <g transform="translate(0 0)">
    <rect width="160" height="160" rx="36" ry="36" fill="url(#rmw-bg)" />
    <text x="80" y="108" text-anchor="middle" fill="#ffffff"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="86" letter-spacing="-4">RM</text>
    <g transform="translate(117 25) rotate(28)">
      <path d="M0 14 C 0 5, 9 0, 18 0 C 18 9, 13 18, 4 18 C 1.6 18, 0 16.4, 0 14 Z"
            fill="url(#rmw-leaf)" />
      <path d="M3 15 Q 10 10, 17 3" stroke="#ffffff" stroke-opacity="0.55"
            stroke-width="1.2" fill="none" stroke-linecap="round" />
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
     font-weight="700" font-size="96" letter-spacing="-3">
    <text x="190" y="110" fill="#1d1d20">Resume</text>
    <text x="495" y="110" fill="#00b67a">mint</text>
  </g>
</svg>
