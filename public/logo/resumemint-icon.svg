<?xml version="1.0" encoding="UTF-8"?>
<!-- ResumeMint icon — rounded-square brand mark with monogram + mint-leaf accent.
     Brand blue from tailwind.config.ts (#2a72d7), accent green (#00b67a). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256"
     role="img" aria-label="ResumeMint">
  <!-- subtle vertical gradient on the brand background -->
  <defs>
    <linearGradient id="rm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d8be0" />
      <stop offset="100%" stop-color="#2a72d7" />
    </linearGradient>
    <linearGradient id="rm-leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#00b67a" />
    </linearGradient>
  </defs>

  <!-- background square (rounded) -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#rm-bg)" />

  <!-- "RM" monogram, optical-aligned -->
  <g fill="#ffffff" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
     font-weight="700" font-size="138" text-anchor="middle">
    <!-- A single tspan keeps kerning predictable in email clients that strip CSS. -->
    <text x="128" y="172" letter-spacing="-6">RM</text>
  </g>

  <!-- Mint-leaf accent — soft droplet/leaf sitting in the top-right -->
  <g transform="translate(186 38) rotate(28)">
    <path d="M0 22
             C 0 8, 14 0, 28 0
             C 28 14, 20 28, 6 28
             C 2.4 28, 0 25.6, 0 22 Z"
          fill="url(#rm-leaf)" />
    <!-- center vein -->
    <path d="M5 24 Q 16 16, 26 4" stroke="#ffffff" stroke-opacity="0.55"
          stroke-width="1.8" fill="none" stroke-linecap="round" />
  </g>
</svg>
